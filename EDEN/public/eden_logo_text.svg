<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
     <filter id="glowText">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(50, 50) scale(0.6)">
      <!-- Mini Icon -->
      <path d="M50 0 L90 25 L90 75 L50 100 L10 75 L10 25 Z" 
            fill="none" stroke="url(#gradText)" stroke-width="5" filter="url(#glowText)"/>
      <path d="M50 20 Q75 50 50 80 Q25 50 50 20 Z" 
            fill="url(#gradText)" />
  </g>
  
  <text x="140" y="140" font-family="Arial, sans-serif" font-weight="bold" font-size="120" fill="url(#gradText)" filter="url(#glowText)" letter-spacing="10">EDEN14</text>
</svg>
