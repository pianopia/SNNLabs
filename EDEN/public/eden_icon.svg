<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#1a1a1a" rx="100" />
  <g filter="url(#glow)">
    <!-- Tech Hexagon -->
    <path d="M256 50 L450 150 L450 362 L256 462 L62 362 L62 150 Z" 
          fill="none" stroke="url(#grad1)" stroke-width="15" />
    
    <!-- Organic Leaf/Flame shape inside -->
    <path d="M256 100 Q350 256 256 412 Q162 256 256 100 Z" 
          fill="url(#grad1)" opacity="0.8" />
          
    <!-- Circuit lines -->
    <circle cx="256" cy="256" r="30" fill="#1a1a1a" />
    <circle cx="256" cy="256" r="20" fill="#fff" />
  </g>
</svg>
