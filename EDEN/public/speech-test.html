<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>簡易文字起こしテスト</title>
</head>
<body style="font-family: sans-serif; padding: 24px;">
    <h2>マイク文字起こしテスト</h2>
    <button id="btn">音声認識スタート</button>
    <div id="content" style="border: 1px solid #ccc; padding: 10px; margin-top: 10px;">
        ここに結果が表示されます...
    </div>
    <pre id="log" style="margin-top: 10px; font-size: 12px; color: #555;"></pre>

    <script>
        const btn = document.getElementById('btn');
        const content = document.getElementById('content');
        const log = document.getElementById('log');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        function append(line) {
            const now = new Date().toLocaleTimeString();
            log.textContent = `[${now}] ${line}\n` + log.textContent;
        }

        if (!SpeechRecognition) {
            alert('お使いのブラウザは音声認識に対応していません。');
            append('SpeechRecognition unsupported');
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;

            btn.onclick = () => {
                try {
                    recognition.start();
                    btn.textContent = '認識中...';
                    append('start called');
                } catch (e) {
                    append(`start error: ${e?.message || e}`);
                }
            };

            recognition.onresult = (event) => {
                const transcript = event.results?.[0]?.[0]?.transcript || '';
                content.textContent = transcript;
                append(`result: ${transcript}`);
            };

            recognition.onerror = (event) => {
                append(`speech error: ${event.error || 'error'}`);
            };

            recognition.onend = () => {
                btn.textContent = '音声認識スタート';
                append('speech ended');
            };
        }
    </script>
</body>
</html>
